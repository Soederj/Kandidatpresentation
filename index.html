<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Kandidatpresentation – Wrknest</title>
<link rel="icon" id="favicon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23F4D4E3'/><text x='50' y='74' font-size='62' font-weight='700' text-anchor='middle' font-family='Arial,sans-serif' fill='%23ED7B4D'>W.</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     WRKNEST BRAND-TOKENS – byt hex-värdena här för exakt branding
     (kopiera från Konkurrentradar om du vill matcha 1:1)
     ============================================================ */
  :root{
    --brand-ink:#3D2530;        /* mörk plommon (text, rubriker) */
    --brand-pink:#F4D4E3;       /* Wrknest ljusrosa (header, bakgrundston) */
    --brand-accent:#ED7B4D;     /* Wrknest korall (knappar, aktivt steg) */
    --brand-accent-soft:#FBE7DD;/* ljus korallyta */
    --brand-salmon:#F09E86;     /* laxrosa (sekundär accent) */
    --paper:#FFFFFF;
    --bg:#FAF1F5;
    --line:#EFDAE3;
    --text:#463038;
    --muted:#8A6E79;
    --good:#0E8F6E; --mid:#C77E1F; --bad:#B4443C;
    --radius:14px;
    --font-display:'Bricolage Grotesque',sans-serif;
    --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh}
  button{font-family:inherit;cursor:pointer}

  /* ============================================================
     TEMA: WRKNEST ENGINEERING – genomgående mörkt, orange accent
     (färger hämtade från wrknestengineering-sajten)
     ============================================================ */
  body.theme-engineering{
    --brand-ink:#F2F5F8;         /* rubriker blir ljusa i mörkt tema */
    --brand-pink:#12161D;        /* header-bakgrund */
    --brand-accent:#FF690B;
    --brand-accent-soft:#33231A; /* mörk orangeton för chips/avatarer */
    --brand-salmon:#FF9A5C;
    --paper:#1A212B; --bg:#0F141B; --line:#2A3340;
    --text:#E6EAEF; --muted:#95A0AC;
    --good:#3FCF8E; --mid:#F0AC4E; --bad:#F87171;
  }
  body.theme-engineering header{color:#fff}
  body.theme-engineering .wordmark{color:#fff}
  body.theme-engineering .intro{color:rgba(255,255,255,.72)}
  body.theme-engineering .client-tag{background:#F0C5D8;color:#12161D}
  body.theme-engineering .overlay{background:rgba(5,8,12,.6)}
  body.theme-engineering .cv-chip{color:#FF8B42}
  body.theme-engineering .cv-chip.none{background:#232C38;color:var(--muted)}
  body.theme-engineering .avatar{color:#FF8B42}
  body.theme-engineering .verdict-dot.meet{background:#16342A}
  body.theme-engineering .verdict-dot.maybe{background:#38290F}
  body.theme-engineering .verdict-dot.no{background:#3A1D1D}
  body.theme-engineering .verdict-btn.meet.sel{background:#16342A;border-color:var(--good)}
  body.theme-engineering .verdict-btn.maybe.sel{background:#38290F;border-color:var(--mid)}
  body.theme-engineering .verdict-btn.no.sel{background:#3A1D1D;border-color:var(--bad)}
  body.theme-engineering .card:hover{box-shadow:0 8px 22px rgba(0,0,0,.45)}
  body.theme-engineering .toast{background:var(--brand-accent);color:#12161D}
  body.theme-engineering .skel{background:linear-gradient(90deg,#1A212B 25%,#242E3B 45%,#1A212B 65%);background-size:200% 100%}
  body.theme-engineering textarea,
  body.theme-engineering input[type=datetime-local],
  body.theme-engineering .note-form input,
  body.theme-engineering select{background:#12161D;color:var(--text);border-color:var(--line)}
  .wm-sub{display:block;font-size:.52em;letter-spacing:.55em;font-weight:400;margin-top:3px}

  /* ---------- Header ---------- */
  header{background:var(--brand-pink);color:var(--brand-ink);padding:26px 28px}
  .head-inner{max-width:1180px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
  .wordmark{font-family:var(--font-display);font-weight:700;font-size:1.05rem;letter-spacing:.14em;text-transform:uppercase;color:var(--brand-accent)}
  h1{font-family:var(--font-display);font-weight:600;font-size:1.7rem;margin-top:6px;line-height:1.2}
  .intro{font-size:.85rem;color:var(--muted);margin-top:8px}
  .client-tag{font-size:.85rem;background:var(--paper);color:var(--brand-ink);padding:6px 14px;border-radius:999px;white-space:nowrap}

  /* ---------- Skeleton-laddning ---------- */
  .skel{background:linear-gradient(90deg,#F7E7EF 25%,#FDF6FA 45%,#F7E7EF 65%);background-size:200% 100%;animation:shimmer 1.3s infinite;border-radius:8px}
  @keyframes shimmer{to{background-position:-200% 0}}
  .skel-card{pointer-events:none}

  /* ---------- Drawer-navigering & omdömes-pop ---------- */
  .drawer-nav{display:flex;gap:8px;flex-shrink:0}
  .close-btn:disabled{opacity:.35;cursor:default}
  @keyframes pop{50%{transform:scale(1.1)}}
  .verdict-btn.sel{animation:pop .22s ease}

  /* ---------- Kvittens ---------- */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(12px);background:var(--brand-ink);color:#fff;
         padding:11px 20px;border-radius:999px;font-size:.85rem;font-weight:600;opacity:0;
         transition:opacity .25s, transform .25s;z-index:120;box-shadow:0 8px 24px rgba(61,37,48,.25);pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .receipt{margin-top:10px;font-size:.74rem;color:var(--muted)}
  .receipt .read{color:var(--good);font-weight:600}

  main{max-width:1180px;margin:0 auto;padding:26px 28px 60px}

  /* ---------- Signatur: processlinjen ---------- */
  .pipeline{display:flex;gap:0;overflow-x:auto;padding-bottom:6px;margin-bottom:26px}
  .step{position:relative;flex:1;min-width:150px;border:1px solid var(--line);background:var(--paper);
        padding:12px 16px 12px 26px;text-align:left;transition:background .15s}
  .step:first-child{border-radius:10px 0 0 10px;padding-left:16px}
  .step:last-child{border-radius:0 10px 10px 0}
  .step:not(:last-child){border-right:none}
  .step::after{content:"";position:absolute;top:50%;right:-9px;width:18px;height:18px;transform:translateY(-50%) rotate(45deg);
        background:var(--paper);border-top:1px solid var(--line);border-right:1px solid var(--line);z-index:2}
  .step:last-child::after{display:none}
  .step .count{font-family:var(--font-display);font-weight:700;font-size:1.25rem;display:block}
  .step .label{font-size:.78rem;color:var(--muted)}
  .step.active{background:var(--brand-accent);border-color:var(--brand-accent);color:#fff}
  .step.active::after{background:var(--brand-accent);border-color:var(--brand-accent)}
  .step.active .label{color:rgba(255,255,255,.85)}
  .step.all-step{flex:0 0 auto;min-width:110px}

  /* ---------- Progress & effekter ---------- */
  .progress-wrap{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .progress-text{font-size:.84rem;font-weight:600;color:var(--brand-ink)}
  .progress-bar{flex:1;min-width:160px;height:10px;background:var(--brand-accent-soft);border-radius:999px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--brand-salmon),var(--brand-accent));border-radius:999px;transition:width .5s ease}
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .confetti{position:fixed;top:-14px;width:9px;height:14px;z-index:99;pointer-events:none;animation:confFall linear forwards}
  @keyframes confFall{to{transform:translateY(105vh) rotate(720deg)}}

  /* ---------- Kandidatkort ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px;
        display:flex;flex-direction:column;gap:10px;text-align:left;transition:transform .12s, box-shadow .12s;
        animation:fadeUp .35s ease backwards}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(18,36,47,.08)}
  .card-top{display:flex;gap:12px;align-items:center}
  .avatar{width:52px;height:52px;border-radius:50%;background:var(--brand-accent-soft);color:var(--brand-accent);
          display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;
          font-size:1.05rem;flex-shrink:0;overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .card h3{font-family:var(--font-display);font-weight:600;font-size:1.02rem;color:var(--brand-ink)}
  .card .stage-pill{font-size:.72rem;color:var(--muted)}
  .card .pitch{font-size:.85rem;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:6px}
  .cv-chip{font-size:.74rem;padding:4px 10px;border-radius:999px;background:var(--brand-accent-soft);color:var(--brand-accent);font-weight:600}
  .cv-chip.none{background:#F1F1F1;color:var(--muted);font-weight:400}
  .verdict-dot{font-size:.76rem;font-weight:600;padding:4px 10px;border-radius:999px}
  .verdict-dot.meet{background:#E3F4EE;color:var(--good)}
  .verdict-dot.maybe{background:#FBF0DE;color:var(--mid)}
  .verdict-dot.no{background:#F9E8E7;color:var(--bad)}

  .empty{padding:60px 20px;text-align:center;color:var(--muted)}

  /* ---------- Detaljpanel ---------- */
  .overlay{position:fixed;inset:0;background:rgba(61,37,48,.45);display:none;z-index:10}
  .overlay.open{display:block}

  /* ---------- Omdömesuppföljning ---------- */
  .fu{margin-top:10px;display:flex;flex-direction:column;gap:8px}
  .fu textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:9px 10px;font-family:inherit;font-size:.83rem;min-height:64px;resize:vertical}
  .fu .hint{font-size:.76rem;color:var(--muted)}
  .fu input[type=datetime-local]{width:100%;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-family:inherit;font-size:.83rem;color:var(--text)}
  .fu .opts{display:flex;gap:14px;flex-wrap:wrap;font-size:.82rem;align-items:center}
  .fu .opts label{display:flex;gap:5px;align-items:center;cursor:pointer}
  .fu select{border:1px solid var(--line);border-radius:10px;padding:7px 10px;font-family:inherit;font-size:.83rem}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(860px,100%);background:var(--bg);z-index:11;
          transform:translateX(100%);transition:transform .22s ease;display:flex;flex-direction:column}
  .drawer.open{transform:translateX(0)}
  .drawer-head{background:var(--paper);border-bottom:1px solid var(--line);padding:18px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px}
  .drawer-head h2{font-family:var(--font-display);font-weight:600;font-size:1.25rem;color:var(--brand-ink)}
  .drawer-head .sub{font-size:.8rem;color:var(--muted);margin-top:2px}
  .close-btn{border:1px solid var(--line);background:var(--paper);border-radius:10px;width:38px;height:38px;font-size:1.1rem}
  .drawer-body{flex:1;overflow-y:auto;padding:20px 24px;display:grid;grid-template-columns:1fr 320px;gap:18px}
  @media(max-width:820px){.drawer-body{grid-template-columns:1fr}}

  .cv-frame-wrap{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;min-height:520px;display:flex;flex-direction:column}
  .cv-frame-wrap iframe{flex:1;border:none;width:100%;min-height:520px}
  .cv-missing{padding:60px 20px;text-align:center;color:var(--muted)}
  .cv-toolbar{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-size:.8rem;color:var(--muted)}
  .cv-toolbar a{color:var(--brand-accent);font-weight:600;text-decoration:none}

  .side{display:flex;flex-direction:column;gap:16px}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .panel h4{font-family:var(--font-display);font-size:.92rem;font-weight:600;color:var(--brand-ink);margin-bottom:10px}
  .pitch-full{font-size:.86rem;color:var(--text);line-height:1.5;white-space:pre-wrap}
  .contact-row{font-size:.84rem;margin-bottom:6px;word-break:break-all}
  .contact-row span{color:var(--muted);display:inline-block;width:64px}

  .verdict-row{display:flex;gap:8px}
  .verdict-btn{flex:1;border:1px solid var(--line);background:var(--paper);border-radius:10px;padding:9px 6px;font-size:.78rem;font-weight:600;color:var(--muted)}
  .verdict-btn.meet.sel{background:#E3F4EE;border-color:var(--good);color:var(--good)}
  .verdict-btn.maybe.sel{background:#FBF0DE;border-color:var(--mid);color:var(--mid)}
  .verdict-btn.no.sel{background:#F9E8E7;border-color:var(--bad);color:var(--bad)}

  .note{border-top:1px solid var(--line);padding:10px 0;font-size:.84rem}
  .note:first-of-type{border-top:none}
  .note .meta{font-size:.72rem;color:var(--muted);margin-bottom:3px}
  .note-form textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:.84rem;resize:vertical;min-height:70px}
  .note-form input{width:100%;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-family:inherit;font-size:.84rem;margin-top:8px}
  .send-btn{margin-top:8px;width:100%;background:var(--brand-accent);color:#fff;border:none;border-radius:10px;padding:10px;font-weight:600;font-size:.86rem}
  .send-btn:disabled{opacity:.5;cursor:default}

  .loading,.fatal{padding:80px 20px;text-align:center;color:var(--muted);font-size:.95rem}
  .fatal{color:var(--bad)}
  footer{text-align:center;font-size:.75rem;color:var(--muted);padding:24px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="head-inner">
    <div>
      <div class="wordmark" id="wordmark">Wrknest</div>
      <h1 id="jobTitle">Laddar…</h1>
      <div class="intro" id="introHint" hidden>Klicka på en kandidat för att läsa mer, se CV och lämna ert omdöme.</div>
    </div>
    <div class="client-tag" id="clientTag" hidden></div>
  </div>
</header>

<main>
  <div id="content"><div class="loading">Hämtar kandidater …</div></div>
</main>

<footer>Presenterat av Wrknest · Innehållet är konfidentiellt och avsett endast för mottagaren.</footer>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer" aria-label="Kandidatdetaljer"></aside>

<script>
/* ================= KONFIG ================= */
const WORKER_URL = "https://kandidatpresentation.jonathan-soderling.workers.dev";
/* ========================================== */

const token = new URLSearchParams(location.search).get("p");
let state = null;          // {jobTitle, client, stages, candidates, feedback, presentations, showContact}
let activeStage = "all";
let openCandidate = null;
let currentList = [];      // senast renderade kandidatlistan (för bläddring i panelen)
let celebrated = null;     // null = ej initierad; konfetti bara när 100 % nås under sessionen
let brand = "wrknest";     // grafisk profil: "wrknest" | "engineering"

const THEME_CONFETTI = {
  wrknest: ["#ED7B4D","#F09E86","#F4D4E3","#3D2530"],
  engineering: ["#FF690B","#FF9A5C","#F0C5D8","#12161D"],
};

function applyTheme(b){
  brand = b === "engineering" ? "engineering" : "wrknest";
  document.body.classList.toggle("theme-engineering", brand === "engineering");
  document.getElementById("wordmark").innerHTML = brand === "engineering"
    ? `WRKNEST<span class="wm-sub">ENGINEERING</span>`
    : "Wrknest";
  if(brand === "engineering"){
    document.getElementById("favicon").href =
      "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%2312161D'/><text x='50' y='74' font-size='62' font-weight='700' text-anchor='middle' font-family='Arial,sans-serif' fill='%23FF690B'>W.</text></svg>";
  }
}

const VERDICTS = [
  {key:"meet", label:"Vill träffa"},
  {key:"maybe", label:"Har frågor"},
  {key:"no", label:"Inte aktuell"},
];
const verdictLabel = k => (VERDICTS.find(v=>v.key===k)||{}).label || "";

init();

async function init(){
  if(!token){ fatal("Länken saknar projektkod. Kontrollera att du fått hela länken."); return; }
  document.getElementById("content").innerHTML = skeletonHtml();
  try{
    const res = await fetch(`${WORKER_URL}/p/${token}`);
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || "Kunde inte hämta projektet.");
    state = data;
    applyTheme(data.brand);
    document.getElementById("jobTitle").textContent = data.jobTitle;
    document.title = data.jobTitle + " – Wrknest";
    document.getElementById("introHint").hidden = false;
    if(data.client){
      const tag = document.getElementById("clientTag");
      tag.textContent = "För " + data.client;
      tag.hidden = false;
    }
    // Sortera kandidaterna i processordning, sedan på namn
    const order = {}; state.stages.forEach((s,i)=>order[s.id]=i);
    state.candidates.sort((a,b)=>{
      const d = (order[a.stageId]??99)-(order[b.stageId]??99);
      return d !== 0 ? d : fullName(a).localeCompare(fullName(b),"sv");
    });
    render();
  }catch(e){ fatal(e.message); }
}

function skeletonHtml(){
  const card = `<div class="card skel-card">
    <div class="skel" style="width:52px;height:52px;border-radius:50%"></div>
    <div class="skel" style="height:14px;width:70%"></div>
    <div class="skel" style="height:10px;width:90%"></div>
    <div class="skel" style="height:10px;width:55%"></div>
  </div>`;
  return `<div class="skel" style="height:64px;border-radius:10px;margin-bottom:26px"></div><div class="grid">${card.repeat(6)}</div>`;
}

function fatal(msg){
  document.getElementById("jobTitle").textContent = "Kandidatpresentation";
  document.getElementById("content").innerHTML = `<div class="fatal">${esc(msg)}</div>`;
}

function render(){
  const stages = state.stages;
  const counts = {};
  for(const c of state.candidates) counts[c.stageId] = (counts[c.stageId]||0)+1;

  const pipeline = `
    <div class="pipeline" role="tablist">
      <button class="step all-step ${activeStage==="all"?"active":""}" onclick="setStage('all')">
        <span class="count">${state.candidates.length}</span><span class="label">Alla kandidater</span>
      </button>
      ${stages.map(s=>`
        <button class="step ${activeStage===s.id?"active":""}" onclick="setStage('${s.id}')">
          <span class="count">${counts[s.id]||0}</span><span class="label">${esc(s.label)}</span>
        </button>`).join("")}
    </div>`;

  const inScope = state.candidates.filter(c=>state.stages.some(s=>s.id===c.stageId));
  const decided = inScope.filter(c=>state.feedback[c.id]&&state.feedback[c.id].verdict).length;
  const pct = inScope.length ? Math.round(100*decided/inScope.length) : 0;
  const done = inScope.length>0 && decided===inScope.length;
  if(celebrated===null) celebrated = done;           // redan klart vid sidladdning → ingen salut
  else if(!celebrated && done){ confettiBurst(); confettiBurst(); celebrated = true; }
  const progress = inScope.length ? `
    <div class="progress-wrap">
      <span class="progress-text">${done
        ? "Tack! Ni har tagit ställning till alla kandidater 🎉"
        : `Ni har tagit ställning till ${decided} av ${inScope.length} kandidater`}</span>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>` : "";

  const visible = state.candidates.filter(c=>{
    if(activeStage==="all") return state.stages.some(s=>s.id===c.stageId);
    return c.stageId===activeStage;
  });
  currentList = visible;

  const cards = visible.length ? `<div class="grid">${visible.map((c,i)=>cardHtml(c,i)).join("")}</div>`
    : `<div class="empty">Inga kandidater i det här steget ännu.</div>`;

  document.getElementById("content").innerHTML = pipeline + progress + cards;
}

function cardHtml(c, idx=0){
  const name = fullName(c);
  const stage = state.stages.find(s=>s.id===c.stageId);
  const fb = state.feedback[c.id];
  const verdict = fb && fb.verdict ? `<span class="verdict-dot ${fb.verdict}">${verdictLabel(fb.verdict)}</span>` : "";
  return `
    <button class="card" style="animation-delay:${Math.min(idx*45,450)}ms" onclick="openDrawer('${c.id}')">
      <div class="card-top">
        <div class="avatar">${c.picture?`<img src="${esc(c.picture)}" alt="">`:initials(name)}</div>
        <div>
          <h3>${esc(name)}</h3>
          <div class="stage-pill">${stage?esc(stage.label):""}</div>
        </div>
      </div>
      ${(state.presentations||{})[c.id]||c.pitch?`<div class="pitch">${esc((state.presentations||{})[c.id]||c.pitch)}</div>`:""}
      <div class="card-foot">
        <span class="cv-chip ${c.hasCv?"":"none"}">${c.hasCv?"CV finns":"CV saknas"}</span>
        ${verdict}
      </div>
    </button>`;
}

function setStage(id){ activeStage=id; render(); }

/* ---------- Detaljpanel ---------- */
function openDrawer(cid){
  openCandidate = state.candidates.find(c=>c.id===cid);
  if(!openCandidate) return;
  renderDrawer();
  document.getElementById("overlay").classList.add("open");
  document.getElementById("drawer").classList.add("open");
}

function renderDrawer(){
  const c = openCandidate;
  const name = fullName(c);
  const fb = state.feedback[c.id] || {verdict:null, notes:[]};
  const stage = state.stages.find(s=>s.id===c.stageId);
  const cvUrl = `${WORKER_URL}/p/${token}/cv/${c.id}`;

  const contact = state.showContact ? `
    <div class="panel"><h4>Kontakt</h4>
      ${c.email?`<div class="contact-row"><span>E-post</span>${esc(c.email)}</div>`:""}
      ${c.phone?`<div class="contact-row"><span>Telefon</span>${esc(c.phone)}</div>`:""}
      ${c["linkedin-url"]?`<div class="contact-row"><span>LinkedIn</span><a href="${esc(c["linkedin-url"])}" target="_blank" rel="noopener">Profil</a></div>`:""}
    </div>`:"";

  const idx = currentList.findIndex(x=>x.id===c.id);
  const total = currentList.length;

  document.getElementById("drawer").innerHTML = `
    <div class="drawer-head">
      <div style="display:flex;align-items:center;gap:12px;min-width:0">
        <div class="avatar">${c.picture?`<img src="${esc(c.picture)}" alt="">`:initials(name)}</div>
        <div style="min-width:0">
          <h2>${esc(name)}</h2>
          <div class="sub">${stage?esc(stage.label):""}${total>1?` · Kandidat ${idx+1} av ${total}`:""}</div>
        </div>
      </div>
      <div class="drawer-nav">
        <button class="close-btn" onclick="navCandidate(-1)" aria-label="Föregående kandidat" ${idx>0?"":"disabled"}>‹</button>
        <button class="close-btn" onclick="navCandidate(1)" aria-label="Nästa kandidat" ${idx>=0&&idx<total-1?"":"disabled"}>›</button>
        <button class="close-btn" onclick="closeDrawer()" aria-label="Stäng">✕</button>
      </div>
    </div>
    <div class="drawer-body">
      <div class="cv-frame-wrap" id="cvArea">
        ${c.hasCv ? `<div class="cv-missing">Hämtar CV …</div>`
        : `<div class="cv-missing">Inget CV uppladdat.<br>Kontakta oss så skickar vi underlag.</div>`}
      </div>
      <div class="side">
        ${(state.presentations||{})[c.id]?`<div class="panel"><h4>Wrknests presentation</h4><div class="pitch-full">${esc(state.presentations[c.id])}</div></div>`:""}
        ${c.pitch?`<div class="panel"><h4>Om kandidaten</h4><div class="pitch-full">${esc(c.pitch)}</div></div>`:""}
        ${contact}
        <div class="panel">
          <h4>Ert omdöme</h4>
          <div class="verdict-row">
            ${VERDICTS.map(v=>`<button class="verdict-btn ${v.key} ${fb.verdict===v.key?"sel":""}" onclick="setVerdict('${v.key}')">${v.label}</button>`).join("")}
          </div>
          ${followupHtml(fb)}
          ${receiptHtml(fb)}
        </div>
        <div class="panel">
          <h4>Noteringar</h4>
          <div id="notesList">${fb.notes.map(noteHtml).join("") || `<div class="note" style="color:var(--muted)">Inga noteringar ännu.</div>`}</div>
          <div class="note-form">
            <textarea id="noteText" placeholder="Skriv en notering till Wrknest …"></textarea>
            <input id="noteAuthor" placeholder="Ditt namn" value="${esc(localStorage.getItem("kp_author")||"")}">
            <button class="send-btn" id="noteSend" onclick="sendNote()">Spara notering</button>
          </div>
        </div>
      </div>
    </div>`;
  if(c.hasCv) loadCv(c, cvUrl);
}

let cvObjectUrl = null;
async function loadCv(c, cvUrl){
  try{
    const res = await fetch(cvUrl);
    if(!res.ok){
      let msg = "Kunde inte hämta CV:t just nu.";
      try{ msg = (await res.json()).error || msg; }catch(e){}
      throw new Error(msg);
    }
    const blob = await res.blob();
    const head = new Uint8Array(await blob.slice(0,5).arrayBuffer());
    const sig = String.fromCharCode.apply(null, head);
    const isPdf = sig.startsWith("%PDF");
    const isZip = sig.startsWith("PK"); // t.ex. Word-filer (.docx)

    // Kandidaten kan ha hunnit bytas medan filen laddades
    if(!openCandidate || openCandidate.id !== c.id) return;
    const area = document.getElementById("cvArea");
    if(!area) return;

    if(cvObjectUrl) URL.revokeObjectURL(cvObjectUrl);
    if(isPdf){
      cvObjectUrl = URL.createObjectURL(blob.slice(0, blob.size, "application/pdf"));
      area.innerHTML = `
        <div class="cv-toolbar"><span>CV</span><a href="${cvObjectUrl}" target="_blank" rel="noopener">Öppna i ny flik</a></div>
        <iframe src="${cvObjectUrl}" title="CV för ${esc(fullName(c))}"></iframe>`;
    } else {
      const fname = "CV - " + fullName(c) + (isZip ? ".docx" : "");
      cvObjectUrl = URL.createObjectURL(blob);
      area.innerHTML = `
        <div class="cv-missing">CV:t är i ett format som inte kan förhandsvisas i webbläsaren.<br><br>
        <a class="send-btn" style="display:inline-block;width:auto;text-decoration:none;padding:10px 22px" href="${cvObjectUrl}" download="${esc(fname)}">Ladda ner CV</a></div>`;
    }
  }catch(e){
    if(!openCandidate || openCandidate.id !== c.id) return;
    const area = document.getElementById("cvArea");
    if(area) area.innerHTML = `<div class="cv-missing">${esc(e.message)}</div>`;
  }
}

function noteHtml(n){
  const d = new Date(n.at);
  return `<div class="note"><div class="meta">${esc(n.author)} · ${d.toLocaleDateString("sv-SE")} ${d.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"})}</div>${esc(n.text)}</div>`;
}

function navCandidate(dir){
  if(!openCandidate) return;
  const idx = currentList.findIndex(x=>x.id===openCandidate.id);
  const next = currentList[idx+dir];
  if(next) openDrawer(next.id);
}

function closeDrawer(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("drawer").classList.remove("open");
  openCandidate=null;
}
document.addEventListener("keydown",e=>{
  if(e.key==="Escape") closeDrawer();
  if(openCandidate && (e.target.tagName!=="TEXTAREA" && e.target.tagName!=="INPUT" && e.target.tagName!=="SELECT")){
    if(e.key==="ArrowLeft") navCandidate(-1);
    if(e.key==="ArrowRight") navCandidate(1);
  }
});

function receiptHtml(fb){
  if(!fb.updatedAt) return "";
  const sent = `Skickat till Wrknest ${fmtShort(fb.updatedAt)} ✓`;
  return `<div class="receipt">${fb.seenAt ? sent + `<span class="read"> · Läst av Wrknest ✓✓</span>` : sent}</div>`;
}

function fmtShort(iso){
  const d = new Date(iso);
  return d.toLocaleDateString("sv-SE",{day:"numeric",month:"short"}) + " " + d.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"});
}

function toast(msg){
  const t = document.createElement("div");
  t.className = "toast"; t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.classList.add("show"));
  setTimeout(()=>{ t.classList.remove("show"); setTimeout(()=>t.remove(), 300); }, 2600);
}

async function setVerdict(key){
  const c = openCandidate;
  const fb = state.feedback[c.id] || {verdict:null, notes:[]};
  const next = fb.verdict===key ? "" : key; // klick igen = avmarkera
  const updated = await postFeedback({candidateId:c.id, verdict:next});
  if(updated){
    state.feedback[c.id]=updated;
    if(next==="meet") confettiBurst();
    toast("Skickat till Wrknest ✓");
    renderDrawer(); render();
  }
}

function confettiBurst(){
  if(matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  const colors = THEME_CONFETTI[brand] || THEME_CONFETTI.wrknest;
  for(let i=0;i<36;i++){
    const el=document.createElement("div");
    el.className="confetti";
    el.style.left=Math.random()*100+"vw";
    el.style.background=colors[i%colors.length];
    el.style.animationDuration=(1.4+Math.random()*1.2)+"s";
    el.style.animationDelay=(Math.random()*.3)+"s";
    el.style.borderRadius=Math.random()<.5?"50%":"2px";
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3200);
  }
}

function followupHtml(fb){
  const v = fb.verdict;
  if(v==="no" || v==="maybe"){
    const ph = v==="no"
      ? "Berätta gärna kort varför – det hjälper oss att träffa mer rätt framåt."
      : "Vilka frågor eller funderingar har ni om kandidaten?";
    return `<div class="fu">
      <textarea id="fuReason" placeholder="${ph}">${esc(fb.reason||"")}</textarea>
      <button class="send-btn" onclick="saveReason(this)">Skicka till Wrknest</button>
    </div>`;
  }
  if(v==="meet"){
    const m = fb.meeting||{};
    const t = m.times||[];
    return `<div class="fu">
      <div class="hint">Föreslå upp till tre tider som passar er (kvartssteg):</div>
      <input type="datetime-local" id="fuT1" step="900" value="${esc(t[0]||"")}">
      <input type="datetime-local" id="fuT2" step="900" value="${esc(t[1]||"")}">
      <input type="datetime-local" id="fuT3" step="900" value="${esc(t[2]||"")}">
      <div class="opts">
        <label><input type="radio" name="fuFormat" value="live" ${m.format==="live"?"checked":""}> Träffas live</label>
        <label><input type="radio" name="fuFormat" value="video" ${m.format!=="live"?"checked":""}> Video</label>
      </div>
      <div class="opts">
        <label>Intervjuns längd:
          <select id="fuDur">
            ${["30","45","60","90"].map(d=>`<option value="${d}" ${String(m.duration||"60")===d?"selected":""}>${d} min</option>`).join("")}
          </select>
        </label>
      </div>
      <button class="send-btn" onclick="saveMeeting(this)">Skicka mötesförslag</button>
    </div>`;
  }
  return "";
}

async function saveReason(btn){
  btn.disabled=true; btn.textContent="Sparar …";
  const updated = await postFeedback({candidateId:openCandidate.id, reason:document.getElementById("fuReason").value.trim()});
  if(updated){ state.feedback[openCandidate.id]=updated; toast("Skickat till Wrknest ✓"); renderDrawer(); render(); }
  else { btn.disabled=false; btn.textContent="Skicka till Wrknest"; }
}

async function saveMeeting(btn){
  btn.disabled=true; btn.textContent="Sparar …";
  const times = ["fuT1","fuT2","fuT3"].map(id=>document.getElementById(id).value).filter(Boolean);
  const format = (document.querySelector('input[name=fuFormat]:checked')||{}).value || "video";
  const duration = document.getElementById("fuDur").value;
  const updated = await postFeedback({candidateId:openCandidate.id, meeting:{times, format, duration}});
  if(updated){ state.feedback[openCandidate.id]=updated; toast("Mötesförslag skickat till Wrknest ✓"); renderDrawer(); render(); }
  else { btn.disabled=false; btn.textContent="Skicka mötesförslag"; }
}

async function sendNote(){
  const text = document.getElementById("noteText").value.trim();
  const author = document.getElementById("noteAuthor").value.trim() || "Kund";
  if(!text) return;
  localStorage.setItem("kp_author", author);
  const btn = document.getElementById("noteSend");
  btn.disabled = true; btn.textContent = "Sparar …";
  const updated = await postFeedback({candidateId:openCandidate.id, note:text, author});
  if(updated){ state.feedback[openCandidate.id]=updated; toast("Notering skickad till Wrknest ✓"); renderDrawer(); }
  else { btn.disabled=false; btn.textContent="Spara notering"; }
}

async function postFeedback(payload){
  try{
    const res = await fetch(`${WORKER_URL}/p/${token}/feedback`,{
      method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||"Kunde inte spara.");
    return data.feedback;
  }catch(e){ alert("Kunde inte spara: "+e.message); return null; }
}

/* ---------- Hjälpare ---------- */
function fullName(c){ return [c["first-name"],c["last-name"]].filter(Boolean).join(" ") || "Kandidat"; }
function initials(n){ return n.split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
function esc(s){ return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
