<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Kandidatpresentation – Wrknest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     WRKNEST BRAND-TOKENS – byt hex-värdena här för exakt branding
     (kopiera från Konkurrentradar om du vill matcha 1:1)
     ============================================================ */
  :root{
    --brand-ink:#12242F;        /* mörk huvudfärg (rubriker, header) */
    --brand-accent:#0E8F6E;     /* accent (knappar, aktivt steg) */
    --brand-accent-soft:#E3F4EE;/* ljus accentyta */
    --paper:#FFFFFF;
    --bg:#F4F6F5;
    --line:#E2E7E5;
    --text:#28343B;
    --muted:#69787F;
    --good:#0E8F6E; --mid:#C77E1F; --bad:#B4443C;
    --radius:14px;
    --font-display:'Bricolage Grotesque',sans-serif;
    --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh}
  button{font-family:inherit;cursor:pointer}

  /* ---------- Header ---------- */
  header{background:var(--brand-ink);color:#fff;padding:26px 28px}
  .head-inner{max-width:1180px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;gap:16px;flex-wrap:wrap}
  .wordmark{font-family:var(--font-display);font-weight:700;font-size:1.05rem;letter-spacing:.14em;text-transform:uppercase;opacity:.92}
  h1{font-family:var(--font-display);font-weight:600;font-size:1.7rem;margin-top:6px;line-height:1.2}
  .client-tag{font-size:.85rem;background:rgba(255,255,255,.12);padding:6px 14px;border-radius:999px;white-space:nowrap}

  main{max-width:1180px;margin:0 auto;padding:26px 28px 60px}

  /* ---------- Signatur: processlinjen ---------- */
  .pipeline{display:flex;gap:0;overflow-x:auto;padding-bottom:6px;margin-bottom:26px}
  .step{position:relative;flex:1;min-width:150px;border:1px solid var(--line);background:var(--paper);
        padding:12px 16px 12px 26px;text-align:left;transition:background .15s}
  .step:first-child{border-radius:10px 0 0 10px;padding-left:16px}
  .step:last-child{border-radius:0 10px 10px 0}
  .step:not(:last-child){border-right:none}
  .step::after{content:"";position:absolute;top:50%;right:-9px;width:18px;height:18px;transform:translateY(-50%) rotate(45deg);
        background:var(--paper);border-top:1px solid var(--line);border-right:1px solid var(--line);z-index:2}
  .step:last-child::after{display:none}
  .step .count{font-family:var(--font-display);font-weight:700;font-size:1.25rem;display:block}
  .step .label{font-size:.78rem;color:var(--muted)}
  .step.active{background:var(--brand-accent);border-color:var(--brand-accent);color:#fff}
  .step.active::after{background:var(--brand-accent);border-color:var(--brand-accent)}
  .step.active .label{color:rgba(255,255,255,.85)}
  .step.all-step{flex:0 0 auto;min-width:110px}

  /* ---------- Kandidatkort ---------- */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px;
        display:flex;flex-direction:column;gap:10px;text-align:left;transition:transform .12s, box-shadow .12s}
  .card:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(18,36,47,.08)}
  .card-top{display:flex;gap:12px;align-items:center}
  .avatar{width:52px;height:52px;border-radius:50%;background:var(--brand-accent-soft);color:var(--brand-accent);
          display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:700;
          font-size:1.05rem;flex-shrink:0;overflow:hidden}
  .avatar img{width:100%;height:100%;object-fit:cover}
  .card h3{font-family:var(--font-display);font-weight:600;font-size:1.02rem;color:var(--brand-ink)}
  .card .stage-pill{font-size:.72rem;color:var(--muted)}
  .card .pitch{font-size:.85rem;color:var(--muted);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:auto;padding-top:6px}
  .cv-chip{font-size:.74rem;padding:4px 10px;border-radius:999px;background:var(--brand-accent-soft);color:var(--brand-accent);font-weight:600}
  .cv-chip.none{background:#F1F1F1;color:var(--muted);font-weight:400}
  .verdict-dot{font-size:.76rem;font-weight:600;padding:4px 10px;border-radius:999px}
  .verdict-dot.meet{background:#E3F4EE;color:var(--good)}
  .verdict-dot.maybe{background:#FBF0DE;color:var(--mid)}
  .verdict-dot.no{background:#F9E8E7;color:var(--bad)}

  .empty{padding:60px 20px;text-align:center;color:var(--muted)}

  /* ---------- Detaljpanel ---------- */
  .overlay{position:fixed;inset:0;background:rgba(18,36,47,.45);display:none;z-index:10}
  .overlay.open{display:block}
  .drawer{position:fixed;top:0;right:0;bottom:0;width:min(860px,100%);background:var(--bg);z-index:11;
          transform:translateX(100%);transition:transform .22s ease;display:flex;flex-direction:column}
  .drawer.open{transform:translateX(0)}
  .drawer-head{background:var(--paper);border-bottom:1px solid var(--line);padding:18px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px}
  .drawer-head h2{font-family:var(--font-display);font-weight:600;font-size:1.25rem;color:var(--brand-ink)}
  .drawer-head .sub{font-size:.8rem;color:var(--muted);margin-top:2px}
  .close-btn{border:1px solid var(--line);background:var(--paper);border-radius:10px;width:38px;height:38px;font-size:1.1rem}
  .drawer-body{flex:1;overflow-y:auto;padding:20px 24px;display:grid;grid-template-columns:1fr 320px;gap:18px}
  @media(max-width:820px){.drawer-body{grid-template-columns:1fr}}

  .cv-frame-wrap{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;min-height:520px;display:flex;flex-direction:column}
  .cv-frame-wrap iframe{flex:1;border:none;width:100%;min-height:520px}
  .cv-missing{padding:60px 20px;text-align:center;color:var(--muted)}
  .cv-toolbar{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;font-size:.8rem;color:var(--muted)}
  .cv-toolbar a{color:var(--brand-accent);font-weight:600;text-decoration:none}

  .side{display:flex;flex-direction:column;gap:16px}
  .panel{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:16px}
  .panel h4{font-family:var(--font-display);font-size:.92rem;font-weight:600;color:var(--brand-ink);margin-bottom:10px}
  .pitch-full{font-size:.86rem;color:var(--text);line-height:1.5;white-space:pre-wrap}
  .contact-row{font-size:.84rem;margin-bottom:6px;word-break:break-all}
  .contact-row span{color:var(--muted);display:inline-block;width:64px}

  .verdict-row{display:flex;gap:8px}
  .verdict-btn{flex:1;border:1px solid var(--line);background:var(--paper);border-radius:10px;padding:9px 6px;font-size:.78rem;font-weight:600;color:var(--muted)}
  .verdict-btn.meet.sel{background:#E3F4EE;border-color:var(--good);color:var(--good)}
  .verdict-btn.maybe.sel{background:#FBF0DE;border-color:var(--mid);color:var(--mid)}
  .verdict-btn.no.sel{background:#F9E8E7;border-color:var(--bad);color:var(--bad)}

  .note{border-top:1px solid var(--line);padding:10px 0;font-size:.84rem}
  .note:first-of-type{border-top:none}
  .note .meta{font-size:.72rem;color:var(--muted);margin-bottom:3px}
  .note-form textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font-family:inherit;font-size:.84rem;resize:vertical;min-height:70px}
  .note-form input{width:100%;border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-family:inherit;font-size:.84rem;margin-top:8px}
  .send-btn{margin-top:8px;width:100%;background:var(--brand-accent);color:#fff;border:none;border-radius:10px;padding:10px;font-weight:600;font-size:.86rem}
  .send-btn:disabled{opacity:.5;cursor:default}

  .loading,.fatal{padding:80px 20px;text-align:center;color:var(--muted);font-size:.95rem}
  .fatal{color:var(--bad)}
  footer{text-align:center;font-size:.75rem;color:var(--muted);padding:24px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>

<header>
  <div class="head-inner">
    <div>
      <div class="wordmark">Wrknest</div>
      <h1 id="jobTitle">Laddar…</h1>
    </div>
    <div class="client-tag" id="clientTag" hidden></div>
  </div>
</header>

<main>
  <div id="content"><div class="loading">Hämtar kandidater …</div></div>
</main>

<footer>Presenterat av Wrknest · Innehållet är konfidentiellt och avsett endast för mottagaren.</footer>

<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer" aria-label="Kandidatdetaljer"></aside>

<script>
/* ================= KONFIG ================= */
const WORKER_URL = "https://DIN-WORKER.DITT-KONTO.workers.dev"; // <-- byt till din Worker-URL
/* ========================================== */

const token = new URLSearchParams(location.search).get("p");
let state = null;          // {jobTitle, client, stages, candidates, feedback, showContact}
let activeStage = "all";
let openCandidate = null;

const VERDICTS = [
  {key:"meet", label:"Vill träffa"},
  {key:"maybe", label:"Har frågor"},
  {key:"no", label:"Inte aktuell"},
];
const verdictLabel = k => (VERDICTS.find(v=>v.key===k)||{}).label || "";

init();

async function init(){
  if(!token){ fatal("Länken saknar projektkod. Kontrollera att du fått hela länken."); return; }
  try{
    const res = await fetch(`${WORKER_URL}/p/${token}`);
    const data = await res.json();
    if(!res.ok) throw new Error(data.error || "Kunde inte hämta projektet.");
    state = data;
    document.getElementById("jobTitle").textContent = data.jobTitle;
    document.title = data.jobTitle + " – Wrknest";
    if(data.client){
      const tag = document.getElementById("clientTag");
      tag.textContent = "För " + data.client;
      tag.hidden = false;
    }
    render();
  }catch(e){ fatal(e.message); }
}

function fatal(msg){
  document.getElementById("jobTitle").textContent = "Kandidatpresentation";
  document.getElementById("content").innerHTML = `<div class="fatal">${esc(msg)}</div>`;
}

function render(){
  const stages = state.stages;
  const counts = {};
  for(const c of state.candidates) counts[c.stageId] = (counts[c.stageId]||0)+1;

  const pipeline = `
    <div class="pipeline" role="tablist">
      <button class="step all-step ${activeStage==="all"?"active":""}" onclick="setStage('all')">
        <span class="count">${state.candidates.length}</span><span class="label">Alla kandidater</span>
      </button>
      ${stages.map(s=>`
        <button class="step ${activeStage===s.id?"active":""}" onclick="setStage('${s.id}')">
          <span class="count">${counts[s.id]||0}</span><span class="label">${esc(s.label)}</span>
        </button>`).join("")}
    </div>`;

  const visible = state.candidates.filter(c=>{
    if(activeStage==="all") return state.stages.some(s=>s.id===c.stageId);
    return c.stageId===activeStage;
  });

  const cards = visible.length ? `<div class="grid">${visible.map(cardHtml).join("")}</div>`
    : `<div class="empty">Inga kandidater i det här steget ännu.</div>`;

  document.getElementById("content").innerHTML = pipeline + cards;
}

function cardHtml(c){
  const name = fullName(c);
  const stage = state.stages.find(s=>s.id===c.stageId);
  const fb = state.feedback[c.id];
  const verdict = fb && fb.verdict ? `<span class="verdict-dot ${fb.verdict}">${verdictLabel(fb.verdict)}</span>` : "";
  return `
    <button class="card" onclick="openDrawer('${c.id}')">
      <div class="card-top">
        <div class="avatar">${c.picture?`<img src="${esc(c.picture)}" alt="">`:initials(name)}</div>
        <div>
          <h3>${esc(name)}</h3>
          <div class="stage-pill">${stage?esc(stage.label):""}</div>
        </div>
      </div>
      ${c.pitch?`<div class="pitch">${esc(c.pitch)}</div>`:""}
      <div class="card-foot">
        <span class="cv-chip ${c.hasCv?"":"none"}">${c.hasCv?"CV finns":"CV saknas"}</span>
        ${verdict}
      </div>
    </button>`;
}

function setStage(id){ activeStage=id; render(); }

/* ---------- Detaljpanel ---------- */
function openDrawer(cid){
  openCandidate = state.candidates.find(c=>c.id===cid);
  if(!openCandidate) return;
  renderDrawer();
  document.getElementById("overlay").classList.add("open");
  document.getElementById("drawer").classList.add("open");
}

function renderDrawer(){
  const c = openCandidate;
  const name = fullName(c);
  const fb = state.feedback[c.id] || {verdict:null, notes:[]};
  const stage = state.stages.find(s=>s.id===c.stageId);
  const cvUrl = `${WORKER_URL}/p/${token}/cv/${c.id}`;

  const contact = state.showContact ? `
    <div class="panel"><h4>Kontakt</h4>
      ${c.email?`<div class="contact-row"><span>E-post</span>${esc(c.email)}</div>`:""}
      ${c.phone?`<div class="contact-row"><span>Telefon</span>${esc(c.phone)}</div>`:""}
      ${c["linkedin-url"]?`<div class="contact-row"><span>LinkedIn</span><a href="${esc(c["linkedin-url"])}" target="_blank" rel="noopener">Profil</a></div>`:""}
    </div>`:"";

  document.getElementById("drawer").innerHTML = `
    <div class="drawer-head">
      <div>
        <h2>${esc(name)}</h2>
        <div class="sub">${stage?esc(stage.label):""}</div>
      </div>
      <button class="close-btn" onclick="closeDrawer()" aria-label="Stäng">✕</button>
    </div>
    <div class="drawer-body">
      <div class="cv-frame-wrap">
        ${c.hasCv ? `
          <div class="cv-toolbar"><span>CV</span><a href="${cvUrl}" target="_blank" rel="noopener">Öppna i ny flik</a></div>
          <iframe src="${cvUrl}" title="CV för ${esc(name)}"></iframe>`
        : `<div class="cv-missing">Inget CV uppladdat.<br>Kontakta oss så skickar vi underlag.</div>`}
      </div>
      <div class="side">
        ${c.pitch?`<div class="panel"><h4>Presentation</h4><div class="pitch-full">${esc(c.pitch)}</div></div>`:""}
        ${contact}
        <div class="panel">
          <h4>Ert omdöme</h4>
          <div class="verdict-row">
            ${VERDICTS.map(v=>`<button class="verdict-btn ${v.key} ${fb.verdict===v.key?"sel":""}" onclick="setVerdict('${v.key}')">${v.label}</button>`).join("")}
          </div>
        </div>
        <div class="panel">
          <h4>Noteringar</h4>
          <div id="notesList">${fb.notes.map(noteHtml).join("") || `<div class="note" style="color:var(--muted)">Inga noteringar ännu.</div>`}</div>
          <div class="note-form">
            <textarea id="noteText" placeholder="Skriv en notering till Wrknest …"></textarea>
            <input id="noteAuthor" placeholder="Ditt namn" value="${esc(localStorage.getItem("kp_author")||"")}">
            <button class="send-btn" id="noteSend" onclick="sendNote()">Spara notering</button>
          </div>
        </div>
      </div>
    </div>`;
}

function noteHtml(n){
  const d = new Date(n.at);
  return `<div class="note"><div class="meta">${esc(n.author)} · ${d.toLocaleDateString("sv-SE")} ${d.toLocaleTimeString("sv-SE",{hour:"2-digit",minute:"2-digit"})}</div>${esc(n.text)}</div>`;
}

function closeDrawer(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("drawer").classList.remove("open");
  openCandidate=null;
}
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeDrawer(); });

async function setVerdict(key){
  const c = openCandidate;
  const fb = state.feedback[c.id] || {verdict:null, notes:[]};
  const next = fb.verdict===key ? "" : key; // klick igen = avmarkera
  const updated = await postFeedback({candidateId:c.id, verdict:next});
  if(updated){ state.feedback[c.id]=updated; renderDrawer(); render(); }
}

async function sendNote(){
  const text = document.getElementById("noteText").value.trim();
  const author = document.getElementById("noteAuthor").value.trim() || "Kund";
  if(!text) return;
  localStorage.setItem("kp_author", author);
  const btn = document.getElementById("noteSend");
  btn.disabled = true; btn.textContent = "Sparar …";
  const updated = await postFeedback({candidateId:openCandidate.id, note:text, author});
  if(updated){ state.feedback[openCandidate.id]=updated; renderDrawer(); }
  else { btn.disabled=false; btn.textContent="Spara notering"; }
}

async function postFeedback(payload){
  try{
    const res = await fetch(`${WORKER_URL}/p/${token}/feedback`,{
      method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(payload)
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data.error||"Kunde inte spara.");
    return data.feedback;
  }catch(e){ alert("Kunde inte spara: "+e.message); return null; }
}

/* ---------- Hjälpare ---------- */
function fullName(c){ return [c["first-name"],c["last-name"]].filter(Boolean).join(" ") || "Kandidat"; }
function initials(n){ return n.split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase(); }
function esc(s){ return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
</script>
</body>
</html>
